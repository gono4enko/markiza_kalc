# Фрагмент для Nginx (reg.ru): прокси на Gunicorn и раздача статики.
# Подставьте server_name и путь к SSL-сертификатам (Let's Encrypt / панель).
#
# upstream не обязателен — можно сразу proxy_pass http://127.0.0.1:5000;

upstream awning_calculator {
    server 127.0.0.1:5000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name calc.example.com;   # замените

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    access_log /var/log/nginx/awning-calculator.access.log;
    error_log  /var/log/nginx/awning-calculator.error.log;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Статика напрямую с диска (меньше нагрузки на Gunicorn)
    location /static/ {
        alias /var/www/awning-calculator/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://awning_calculator;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
